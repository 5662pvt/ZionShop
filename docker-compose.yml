name: zionshop

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: zionshop-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-Your_Strong_P@ss1}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: zionshop-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: zionshop-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS:-guest}"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  seq:
    image: datalust/seq:latest
    container_name: zionshop-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "8081:80"
      - "5341:5341"
    volumes:
      - seq-data:/data

  api:
    build:
      context: .
      dockerfile: backend/src/Api/ZIONShop.Api/Dockerfile
    container_name: zionshop-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ZIONShop;User Id=sa;Password=${DB_PASSWORD:-Your_Strong_P@ss1};TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-docker-only-signing-key-please-rotate-32+chars-zionshop}"
      EventBus__Provider: "RabbitMq"
      EventBus__Host: rabbitmq
      EventBus__User: "${RABBITMQ_USER:-guest}"
      EventBus__Pass: "${RABBITMQ_PASS:-guest}"
      Redis__Configuration: "redis:6379"
      Serilog__WriteTo__1__Name: Seq
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:5341"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Cors__AllowedOrigins__1: "http://localhost"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: zionshop-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api

  frontend-dev:
    image: node:20-alpine
    profiles: ["dev"]
    container_name: zionshop-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  sqlserver-data:
  seq-data:
